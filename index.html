<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mening Byudjetim</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:1rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-top:0.5rem}
.header h1{font-size:20px;font-weight:600}
.sync-btn{padding:6px 12px;border-radius:10px;border:1px solid #d1d1d6;background:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;color:#555}
.sync-btn:hover{background:#f0f0f5}
.sheets-badge{display:flex;align-items:center;gap:5px;font-size:12px;color:#34c759;margin-bottom:12px;font-weight:500}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.stat{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.3px}
.stat-val{font-size:20px;font-weight:600}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:7px 13px;border-radius:20px;border:1px solid #d1d1d6;font-size:13px;cursor:pointer;background:#fff;color:#555;font-weight:500}
.tab.active{background:#007aff;color:#fff;border-color:#007aff}
.input-card{background:#fff;border-radius:16px;padding:1rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.input-row{display:flex;gap:8px;margin-bottom:10px}
.input-row input,.input-row select{flex:1;min-width:0;font-size:14px;padding:9px 12px;border-radius:10px;border:1px solid #d1d1d6;background:#f9f9fb;outline:none}
.input-row input:focus,.input-row select:focus{border-color:#007aff;background:#fff}
.input-row input[type=number]{max-width:120px}
.action-row{display:flex;gap:8px;margin-bottom:10px}
.btn{flex:1;padding:9px;border-radius:10px;border:1px solid #d1d1d6;background:#f9f9fb;font-size:13px;cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:500}
.btn:hover{background:#e8e8ed}
.btn.recording{background:#fff0f0;color:#ff3b30;border-color:#ff3b30}
.btn-primary{background:#007aff;color:#fff;border-color:#007aff;width:100%;padding:11px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary:hover{background:#0066dd}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.status-box{background:#f0f7ff;border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:13px;color:#007aff;display:none;line-height:1.5}
.status-box.show{display:block}
.status-box.error{background:#fff0f0;color:#ff3b30}
.preview-img{width:100%;max-height:130px;object-fit:contain;border-radius:10px;margin-bottom:10px;display:none;border:1px solid #e5e5ea}
.section-lbl{font-size:14px;font-weight:600;color:#555;margin-bottom:8px}
.list{display:flex;flex-direction:column;gap:8px}
.item{background:#fff;border-radius:14px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.item-name{font-size:14px;font-weight:500;color:#1d1d1f}
.item-meta{font-size:12px;color:#888;margin-top:2px}
.item-amount{font-size:15px;font-weight:600}
.empty{text-align:center;color:#aaa;font-size:14px;padding:2rem 0}
.loading{text-align:center;color:#aaa;font-size:14px;padding:1.5rem 0}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>💰 Mening byudjetim</h1>
    <button class="sync-btn" onclick="loadFromSheets()">🔄 Yangilash</button>
  </div>
  <div class="sheets-badge">🟢 Google Sheets ga ulangan</div>

  <div class="summary-grid">
    <div class="stat"><div class="stat-label">Daromad</div><div class="stat-val" id="s-income" style="color:#34c759">0 so'm</div></div>
    <div class="stat"><div class="stat-label">Xarajat</div><div class="stat-val" id="s-expense" style="color:#ff3b30">0 so'm</div></div>
    <div class="stat"><div class="stat-label">Qarz</div><div class="stat-val" id="s-debt" style="color:#ff9500">0 so'm</div></div>
    <div class="stat"><div class="stat-label">Jamg'arma</div><div class="stat-val" id="s-saving" style="color:#007aff">0 so'm</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('income')">📈 Daromad</button>
    <button class="tab" onclick="setTab('expense')">📉 Xarajat</button>
    <button class="tab" onclick="setTab('debt')">💳 Qarz</button>
    <button class="tab" onclick="setTab('saving')">🐷 Jamg'arma</button>
  </div>

  <div class="input-card">
    <div class="input-row">
      <input type="text" id="inp-name" placeholder="Nomi" />
      <input type="number" id="inp-amount" placeholder="Summa" min="0" />
    </div>
    <div class="input-row">
      <select id="inp-cat"><option value="">Kategoriya</option></select>
    </div>
    <div id="status-box" class="status-box"></div>
    <img id="preview-img" class="preview-img" alt="Yuklangan rasm" />
    <div class="action-row">
      <button class="btn" id="mic-btn" onclick="toggleVoice()">🎤 Ovoz</button>
      <button class="btn" onclick="document.getElementById('img-input').click()">📷 Rasm</button>
      <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImage(event)" />
    </div>
    <button class="btn-primary" id="add-btn" onclick="addItem()">➕ Qo'shish → Sheets</button>
  </div>

  <div class="section-lbl" id="list-lbl">Daromad ro'yxati</div>
  <div class="list" id="item-list"><div class="loading">⏳ Yuklanmoqda...</div></div>
</div>

<script>
const SHEETS_URL='https://script.google.com/macros/s/AKfycbz5sWR4XHkzau7G3RtIacMd7JzPyPrHlW7KW9Gyg7t7sNNhvgUsy5sj20xtV6DGKuBdwA/exec';
const CLAUDE_URL='https://api.anthropic.com/v1/messages';
const CATS={income:['Ish haqi','Biznes','Freelance','Investitsiya','Boshqa'],expense:['Oziq-ovqat','Transport','Uy-joy','Kiyim',"Sog'liq","O'yin-kulgi",'Kommunal','Boshqa'],debt:['Bank krediti',"Do'stdan",'Oila','Boshqa'],saving:["Favqulodda fond","Ta'til",'Uy','Mashina','Boshqa']};
const COLORS={income:'#34c759',expense:'#ff3b30',debt:'#ff9500',saving:'#007aff'};
const LABELS={income:'Daromad',expense:'Xarajat',debt:'Qarz',saving:"Jamg'arma"};

let allData=[];
let tab='income';
let recognition=null;
let isRecording=false;

function fmt(n){return Math.round(Number(n)||0).toLocaleString('uz-UZ')+" so'm"}

function setStatus(msg,type='info'){
  const b=document.getElementById('status-box');
  b.textContent=msg;
  b.className='status-box show'+(type==='error'?' error':'');
  if(!msg)b.className='status-box';
}

function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['income','expense','debt','saving'][i]===t));
  const sel=document.getElementById('inp-cat');
  sel.innerHTML='<option value="">Kategoriya</option>';
  CATS[t].forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  document.getElementById('list-lbl').textContent=LABELS[t]+" ro'yxati";
  renderList();
}

async function loadFromSheets(){
  document.getElementById('item-list').innerHTML='<div class="loading">⏳ Yuklanmoqda...</div>';
  try{
    const res=await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({action:'get'})});
    const d=await res.json();
    allData=(d.rows||[]).map((r,i)=>({id:i,date:r[0],type:r[1],name:r[2],cat:r[3],amount:Number(r[4])||0}));
    updateSummary();renderList();
  }catch(e){
    document.getElementById('item-list').innerHTML='<div class="empty">❌ Sheets dan yuklab bo\'lmadi</div>';
  }
}

function updateSummary(){
  ['income','expense','debt','saving'].forEach(k=>{
    const total=allData.filter(x=>x.type===k).reduce((s,x)=>s+x.amount,0);
    document.getElementById('s-'+k).textContent=fmt(total);
  });
}

function renderList(){
  const items=allData.filter(x=>x.type===tab);
  const list=document.getElementById('item-list');
  if(!items.length){list.innerHTML='<div class="empty">Hozircha yozuv yo\'q</div>';return;}
  list.innerHTML=items.slice().reverse().map(x=>`
    <div class="item">
      <div>
        <div class="item-name">${x.name||''}</div>
        <div class="item-meta">${x.cat||''} · ${x.date||''}</div>
      </div>
      <span class="item-amount" style="color:${COLORS[tab]}">${fmt(x.amount)}</span>
    </div>`).join('');
}

async function addItem(){
  const name=document.getElementById('inp-name').value.trim();
  const amount=parseFloat(document.getElementById('inp-amount').value);
  const cat=document.getElementById('inp-cat').value||'Boshqa';
  if(!name||!amount||amount<=0){setStatus('Iltimos, nom va summani kiriting.','error');return;}
  const btn=document.getElementById('add-btn');
  btn.disabled=true;btn.textContent='⏳ Saqlanmoqda...';
  setStatus("Google Sheets ga saqlanmoqda...");
  try{
    await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({action:'add',date:new Date().toLocaleDateString('uz-UZ'),type:tab,name,cat,amount})});
    document.getElementById('inp-name').value='';
    document.getElementById('inp-amount').value='';
    document.getElementById('preview-img').style.display='none';
    setStatus('✅ Sheets ga saqlandi!');
    await loadFromSheets();
    setTimeout(()=>setStatus(''),2500);
  }catch(e){setStatus('❌ Xato! Internet yoki URL ni tekshiring.','error');}
  btn.disabled=false;btn.innerHTML='➕ Qo\'shish → Sheets';
}

function toggleVoice(){
  if(isRecording){stopVoice();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setStatus("Brauzer ovoz kiritishni qo'llab-quvvatlamaydi.",'error');return;}
  recognition=new SR();recognition.lang='uz-UZ';recognition.interimResults=false;
  recognition.onstart=()=>{
    isRecording=true;
    const b=document.getElementById('mic-btn');
    b.className='btn recording';b.textContent="⏹ To'xtatish";
    setStatus("Gapiring... (masalan: 'non uchun 15000 so'm')");
  };
  recognition.onresult=e=>{const t=e.results[0][0].transcript;setStatus('"'+t+'" — tahlil qilinmoqda...');analyzeVoice(t);};
  recognition.onerror=e=>{setStatus('Xato: '+e.error,'error');stopVoice();};
  recognition.onend=()=>stopVoice();
  recognition.start();
}

function stopVoice(){
  isRecording=false;if(recognition)recognition.stop();
  const b=document.getElementById('mic-btn');b.className='btn';b.textContent='🎤 Ovoz';
}

async function analyzeVoice(text){
  try{
    const res=await fetch(CLAUDE_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,
        messages:[{role:'user',content:`"${tab}" uchun ovozdan: "${text}". JSON qaytар: {"name":"...","amount":12345,"cat":"..."}. Kategoriyalar: ${CATS[tab].join(', ')}`}]})});
    const d=await res.json();
    const p=JSON.parse(d.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
    if(p.name)document.getElementById('inp-name').value=p.name;
    if(p.amount>0)document.getElementById('inp-amount').value=p.amount;
    if(p.cat){const s=document.getElementById('inp-cat');for(let o of s.options)if(o.value===p.cat){s.value=p.cat;break;}}
    setStatus("Tayyor! Tekshirib 'Qo'shish' ni bosing.");
  }catch(e){setStatus("Tahlil xatosi. Qo'lda to'ldiring.",'error');}
}

async function handleImage(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const base64=ev.target.result.split(',')[1];
    const img=document.getElementById('preview-img');img.src=ev.target.result;img.style.display='block';
    setStatus('Rasm tahlil qilinmoqda...');
    try{
      const res=await fetch(CLAUDE_URL,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:base64}},
            {type:'text',text:`"${tab}" uchun rasmdan nomi, summasi va kategoriyani top. JSON: {"name":"...","amount":12345,"cat":"..."}. Kategoriyalar: ${CATS[tab].join(', ')}`}
          ]}]})});
      const d=await res.json();
      const p=JSON.parse(d.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
      if(p.name)document.getElementById('inp-name').value=p.name;
      if(p.amount>0)document.getElementById('inp-amount').value=p.amount;
      if(p.cat){const s=document.getElementById('inp-cat');for(let o of s.options)if(o.value===p.cat){s.value=p.cat;break;}}
      setStatus("Rasm o'qildi! Tekshirib 'Qo'shish' ni bosing.");
    }catch(e){setStatus("Rasmni o'qishda xato.",'error');}
  };
  reader.readAsDataURL(file);e.target.value='';
}

setTab('income');
loadFromSheets();
</script>
</body>
</html>
